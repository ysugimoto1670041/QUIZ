<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LTCB84同期会クイズ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --logo-red: #ff2d1f;
  --logo-pink: #d6285c;
  --cream: #fff5f0;
  --soft-pink: #ffe8e0;
  --gold: #ffd54a;
  --deep: #2b1a3f;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: linear-gradient(135deg, #ffe0d0 0%, #ffd0e0 50%, #ffe8d0 100%);
  min-height: 100vh;
  color: var(--deep);
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(circle at 10% 20%, rgba(255,45,31,0.08) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(214,40,92,0.08) 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(255,213,74,0.05) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}
.container {
  position: relative; z-index: 1;
  max-width: 1100px; margin: 0 auto; padding: 24px 16px 80px;
}
.logo-fixed {
  position: fixed; top: 16px; right: 16px; z-index: 100;
  width: 64px; height: 64px;
  background: white;
  border-radius: 50%;
  padding: 6px;
  box-shadow: 0 6px 20px rgba(214,40,92,0.25);
  border: 2px solid white;
}
.logo-fixed img { width: 100%; height: 100%; object-fit: contain; }
.title-block {
  text-align: center;
  padding: 40px 60px 20px 16px;
  margin-bottom: 24px;
}
.title-main {
  font-family: 'Fredoka', sans-serif;
  font-weight: 700;
  font-size: clamp(28px, 6vw, 44px);
  background: linear-gradient(135deg, var(--logo-red) 0%, var(--logo-pink) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.02em;
  line-height: 1.1;
}
.title-sub {
  font-size: 14px;
  color: var(--logo-pink);
  font-weight: 700;
  margin-top: 8px;
  letter-spacing: 0.2em;
}
.role-badge {
  display: inline-block;
  background: var(--deep);
  color: white;
  padding: 4px 16px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  margin-bottom: 16px;
}
.card {
  background: white;
  border-radius: 24px;
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: 0 8px 32px rgba(214,40,92,0.1), 0 2px 8px rgba(0,0,0,0.04);
  border: 2px solid rgba(255,255,255,0.8);
}
.card h2 {
  font-size: 18px;
  font-weight: 900;
  color: var(--logo-pink);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.card h2::before {
  content: ''; width: 6px; height: 22px;
  background: linear-gradient(180deg, var(--logo-red), var(--logo-pink));
  border-radius: 3px;
}
label {
  display: block; font-weight: 700; font-size: 13px;
  margin-bottom: 6px; color: var(--deep);
}
input[type=text], input[type=number], textarea, select {
  width: 100%;
  padding: 12px 14px;
  border: 2px solid #f0d5d0;
  border-radius: 12px;
  font-family: inherit;
  font-size: 15px;
  background: var(--cream);
  transition: all 0.2s;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--logo-pink);
  background: white;
  box-shadow: 0 0 0 4px rgba(214,40,92,0.1);
}
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 24px;
  background: linear-gradient(135deg, var(--logo-red) 0%, var(--logo-pink) 100%);
  color: white;
  border: none;
  border-radius: 999px;
  font-family: inherit;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(214,40,92,0.3);
  transition: all 0.2s;
  text-decoration: none;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(214,40,92,0.4); }
.btn:active { transform: translateY(0); }
.btn.secondary {
  background: white; color: var(--logo-pink);
  border: 2px solid var(--logo-pink);
  box-shadow: none;
}
.btn.danger { background: linear-gradient(135deg, #888, #555); }
.btn.gold { background: linear-gradient(135deg, #ffb84a, #ff8c1a); box-shadow: 0 6px 16px rgba(255,140,26,0.3); }
.btn-row { display: flex; flex-wrap: wrap; gap: 8px; }
.q-list { display: flex; flex-direction: column; gap: 12px; }
.q-item {
  background: var(--cream);
  border: 2px dashed #f0c5c0;
  border-radius: 16px;
  padding: 14px;
  display: flex; align-items: center; gap: 12px;
}
.q-num {
  flex-shrink: 0;
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--logo-red), var(--logo-pink));
  color: white; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 16px;
}
.q-text { flex: 1; font-size: 14px; font-weight: 700; min-width: 0; word-break: break-word; }
.q-actions { display: flex; gap: 6px; flex-shrink: 0; }
.icon-btn {
  width: 32px; height: 32px;
  border: none; border-radius: 50%;
  background: white;
  cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.icon-btn:hover { background: var(--logo-pink); color: white; }
.choices-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px;
}
.choice-input {
  border: 3px solid #f0d5d0;
  border-radius: 16px;
  padding: 12px;
  background: white;
  position: relative;
}
.choice-input.correct {
  border-color: #4caf50;
  background: #f0fff4;
}
.choice-input label {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px;
  color: var(--logo-pink);
}
.choice-input input { padding: 8px 10px; font-size: 14px; }
.choice-input .img-preview {
  width: 100%; height: 80px;
  background: var(--cream); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #999;
  margin-top: 6px;
  background-size: cover; background-position: center;
  cursor: pointer;
  overflow: hidden;
}
.choice-input .img-preview.has-img { color: transparent; }
.correct-radio {
  display: flex; gap: 6px; margin-top: 6px;
  font-size: 11px;
}
.image-upload {
  width: 100%;
  border: 2px dashed #f0c5c0;
  border-radius: 12px;
  padding: 14px;
  text-align: center;
  cursor: pointer;
  background: var(--cream);
  font-size: 13px;
  color: var(--logo-pink);
  font-weight: 700;
  margin-top: 6px;
  transition: all 0.2s;
}
.image-upload:hover { background: var(--soft-pink); border-color: var(--logo-pink); }
.image-upload.has-img {
  background-size: cover; background-position: center;
  height: 120px; color: transparent; border-style: solid;
  position: relative;
}
.image-upload.has-img::after {
  content: '画像を変更'; position: absolute;
  bottom: 6px; right: 6px;
  background: rgba(0,0,0,0.6); color: white;
  padding: 3px 8px; border-radius: 999px; font-size: 10px;
}
.tab-bar {
  display: flex; gap: 4px;
  background: white;
  border-radius: 999px;
  padding: 4px;
  margin-bottom: 16px;
  box-shadow: 0 4px 16px rgba(214,40,92,0.1);
}
.tab {
  flex: 1; padding: 10px;
  border: none; background: transparent;
  border-radius: 999px;
  font-family: inherit; font-weight: 700; font-size: 13px;
  cursor: pointer; color: #999;
  transition: all 0.2s;
}
.tab.active {
  background: linear-gradient(135deg, var(--logo-red), var(--logo-pink));
  color: white;
  box-shadow: 0 2px 8px rgba(214,40,92,0.3);
}
.hidden { display: none !important; }
.status-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px;
  background: var(--cream);
  border-radius: 999px;
  font-size: 12px; font-weight: 700;
  color: var(--logo-pink);
}
.status-pill .dot {
  width: 8px; height: 8px;
  background: #ff4444; border-radius: 50%;
  animation: pulse 1.5s ease-in-out infinite;
}
.status-pill.live .dot { background: #4caf50; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.live-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-top: 12px;
}
.live-stat {
  background: var(--cream);
  border-radius: 14px;
  padding: 12px; text-align: center;
}
.live-stat .num {
  font-family: 'Fredoka', sans-serif;
  font-size: 32px; font-weight: 700;
  color: var(--logo-pink);
}
.live-stat .lbl { font-size: 11px; color: #888; font-weight: 700; }
.qr-area {
  text-align: center; padding: 16px;
  background: var(--cream); border-radius: 16px;
}
.qr-area canvas, .qr-area img { background: white; padding: 10px; border-radius: 12px; }
.url-display {
  word-break: break-all;
  background: white;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 12px;
  margin-top: 10px;
  font-family: monospace;
  border: 1px solid #f0d5d0;
}
.config-warn {
  background: #fff3cd;
  border-left: 4px solid #ffc107;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
}
.config-warn h3 { font-size: 14px; margin-bottom: 6px; color: #b8860b; }
.config-warn code {
  display: block; background: white; padding: 6px 8px;
  border-radius: 4px; font-size: 11px; margin: 4px 0;
  word-break: break-all;
}
.ranking-list {
  display: flex; flex-direction: column; gap: 8px;
  max-height: 50vh; overflow-y: auto;
}
.rank-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--cream);
  border-radius: 12px;
  font-weight: 700;
}
.rank-item.top {
  background: linear-gradient(135deg, #fff8dc, #ffe5b4);
  border: 2px solid var(--gold);
}
.rank-pos { font-size: 18px; min-width: 32px; }
.rank-name { flex: 1; }
.rank-score { font-family: 'Fredoka'; color: var(--logo-pink); font-size: 18px; }
@media (max-width: 480px) {
  .live-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<div class="container">
  <div class="title-block">
    <div class="role-badge">ADMIN / 管理者</div>
    <h1 class="title-main">LTCB84同期会<br>クイズ</h1>
    <div class="title-sub">QUIZ Admin Panel</div>
  </div>

<div class="tab-bar">
    <button class="tab active" data-tab="setup">📝 設問設定</button>
    <button class="tab" data-tab="live">🎮 ライブ管理</button>
    <button class="tab" data-tab="share">📱 参加者URL</button>
  </div>

  <!-- 設問設定タブ -->
  <div id="tab-setup">
    <div class="card">
      <h2>クイズ全体の設定</h2>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div>
          <label>制限時間(秒)</label>
          <input type="number" id="time-limit" min="5" max="120" value="20">
        </div>
        <div>
          <label>出題数</label>
          <input type="number" id="q-count" min="1" max="10" value="5">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>設問リスト</h2>
      <div id="q-list" class="q-list"></div>
      <div class="btn-row" style="margin-top:14px;">
        <button class="btn" onclick="openQuestionEditor()">+ 質問を追加</button>
      </div>
    </div>

    <div class="card">
      <h2>クイズを開始する</h2>
      <p style="font-size:13px; color:#666; margin-bottom:12px;">参加者がQRコードから参加した状態で「クイズ開始」を押すと、全員の画面で同時にクイズが始まります。</p>
      <div class="btn-row">
        <button class="btn gold" onclick="startQuiz()">▶ クイズ開始</button>
        <button class="btn secondary" onclick="resetQuiz()">参加者をリセット</button>
      </div>
    </div>
  </div>

  <!-- 問題編集モーダル -->
  <div id="q-editor" class="card hidden" style="position:fixed; top:0; left:0; right:0; bottom:0; z-index:200; margin:0; border-radius:0; overflow-y:auto; background: linear-gradient(135deg, #ffe0d0 0%, #ffd0e0 100%);">
    <div style="max-width:700px; margin:0 auto; padding:60px 16px 40px;">
      <h2 style="margin-bottom:16px;">問題を編集</h2>
      <div class="card">
        <label>問題文</label>
        <textarea id="qe-text" rows="3" placeholder="例:LTCBが設立されたのは何年?"></textarea>
        <label style="margin-top:12px;">問題の画像(任意)</label>
        <div id="qe-image" class="image-upload" onclick="document.getElementById('qe-image-file').click()">
          📷 タップして画像を選択
        </div>
        <input type="file" id="qe-image-file" accept="image/*" style="display:none;">
      </div>

      <div class="card">
        <h2>選択肢と正解</h2>
        <div class="choices-grid" id="qe-choices"></div>
      </div>

      <div class="btn-row">
        <button class="btn" onclick="saveQuestion()">💾 保存</button>
        <button class="btn secondary" onclick="closeQuestionEditor()">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- ライブ管理タブ -->
  <div id="tab-live" class="hidden">
    <div class="card">
      <h2>クイズ進行状況 <span id="live-status" class="status-pill"><span class="dot"></span>待機中</span></h2>
      <div class="live-grid">
        <div class="live-stat">
          <div class="num" id="stat-players">0</div>
          <div class="lbl">参加者</div>
        </div>
        <div class="live-stat">
          <div class="num" id="stat-current">-</div>
          <div class="lbl">現在の問題</div>
        </div>
        <div class="live-stat">
          <div class="num" id="stat-answered">0</div>
          <div class="lbl">回答済み</div>
        </div>
        <div class="live-stat">
          <div class="num" id="stat-state">-</div>
          <div class="lbl">状態</div>
        </div>
      </div>
      <div class="btn-row" style="margin-top:14px;">
        <button class="btn" id="btn-next" onclick="nextStep()">▶ 次へ</button>
        <button class="btn secondary" onclick="endQuiz()">クイズ終了</button>
      </div>
    </div>

    <div class="card">
      <h2>現在のランキング</h2>
      <div id="live-ranking" class="ranking-list"></div>
    </div>
  </div>

  <!-- 共有タブ -->
  <div id="tab-share" class="hidden">
    <div class="card">
      <h2>参加者用URL</h2>
      <p style="font-size:13px; color:#666; margin-bottom:10px;">参加者はこのURLにアクセスするか、QRコードをスキャンしてクイズに参加します。</p>
      <div class="qr-area">
        <div id="qrcode"></div>
        <div class="url-display" id="participant-url"></div>
        <button class="btn" style="margin-top:10px;" onclick="copyURL()">📋 URLをコピー</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="admin.js"></script>
</body>
